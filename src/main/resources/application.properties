quarkus.application.name=pagopa-ecommerce-payment-methods-handler
quarkus.jackson.serialization-inclusion=non_null
#OTEL configuration
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL}
quarkus.otel.logs.exporter=${OTEL_LOGS_EXPORTER:none}
quarkus.otel.traces.sampler=${OTEL_TRACES_SAMPLER:always_on}
quarkus.otel.resource.attributes=${OTEL_RESOURCE_ATTRIBUTES}
#LOG config
quarkus.log.level=${ROOT_LOG_LEVEL:INFO}
quarkus.log.console.json.excluded-keys=loggerClassName
quarkus.log.console.json.additional-field."service.name".type=string
quarkus.log.console.json.additional-field."service.name".value=${ECS_SERVICE_NAME:undefined}
quarkus.log.console.json.additional-field."service.version".type=string
quarkus.log.console.json.additional-field."service.version".value=${quarkus.application.version}
quarkus.log.console.json.additional-field."service.environment".type=string
quarkus.log.console.json.additional-field."service.environment".value=${ECS_SERVICE_ENVIRONMENT:undefined}
#SECURITY API KEY
security.apiKey.primary=${SECURITY_API_KEY_PRIMARY}
security.apiKey.secondary=${SECURITY_API_KEY_SECONDARY}
security.apiKey.securedPaths=${SECURITY_API_KEY_SECURED_PATHS}
#OpenApi Client Generator Config
quarkus.openapi-generator.codegen.input-base-dir=api-client
quarkus.openapi-generator.codegen.spec.afm_yaml.mutiny=true
quarkus.openapi-generator.codegen.spec.afm_yaml.base-package=it.pagopa.generated.ecommerce.client
quarkus.openapi-generator.codegen.spec.afm_yaml.model-name-suffix=dto
#AFM Config
quarkus.rest-client.afm_yaml.url=${AFM_URI_V1}
quarkus.rest-client.afm_yaml.headers.ocp-apim-subscription-key=${AFM_KEY}
quarkus.rest-client."it.pagopa.generated.ecommerce.client.api.PaymentMethodsApi".connect-timeout=${AFM_CONNECTION_TIMEOUT}
quarkus.rest-client."it.pagopa.generated.ecommerce.client.api.PaymentMethodsApi".read-timeout=${AFM_READ_TIMEOUT}
#NPG Config
quarkus.rest-client.npg-api.url=${NPG_URI}
quarkus.rest-client.npg-api.connect-timeout=${NPG_CONNECTION_TIMEOUT:5000}
quarkus.rest-client.npg-api.read-timeout=${NPG_READ_TIMEOUT:10000}
npg.client.api-key=${NPG_API_KEY}
npg.sessions.ttl-seconds=${NPG_SESSIONS_TTL:600}
npg.notification.jwt.validity.time=${NPG_NOTIFICATION_JWT_VALIDITY_TIME:900}
#JWT Issuer Config
quarkus.rest-client.jwt-issuer-api.url=${JWT_ISSUER_URI}
quarkus.rest-client.jwt-issuer-api.connect-timeout=${JWT_ISSUER_CONNECTION_TIMEOUT:5000}
quarkus.rest-client.jwt-issuer-api.read-timeout=${JWT_ISSUER_READ_TIMEOUT:10000}
jwt-issuer.api-key=${JWT_ISSUER_API_KEY}
#Session URL Config
session-url.base-path=${SESSION_URL_BASE_PATH}
session-url.io-base-path=${SESSION_URL_IO_BASE_PATH}
session-url.outcome-suffix=${SESSION_URL_OUTCOME_SUFFIX:/esito}
session-url.cancel-suffix=${SESSION_URL_CANCEL_SUFFIX:/annulla}
session-url.notification-url=${SESSION_URL_NOTIFICATION_URL}
#Redis Config
quarkus.redis.hosts=${REDIS_HOST:redis://localhost:6379}
quarkus.redis.password=${REDIS_PASSWORD:}
